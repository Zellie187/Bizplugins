name: Documentation Validation

on:

  push:
    paths:
      - "docs/**"
      - "*.md"

  pull_request:
    paths:
      - "docs/**"
      - "*.md"

jobs:

  markdown:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md